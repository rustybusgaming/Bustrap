name: Release Bustrap

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Get version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(.+)$') {
            $version = $matches[1]
          } else {
            Write-Error "Tag format should be 'vX.Y.Z'"
            exit 1
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Restore
        run: dotnet restore .\Bustrap.sln -r win-x64

      - name: Build
        run: dotnet build .\Bustrap.sln -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish
        run: |
          dotnet publish .\Bustrap\Bustrap.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o .\artifacts\publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bustrap-win-x64
          path: .\artifacts\publish
          retention-days: 14

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: .\artifacts\publish\*.exe
