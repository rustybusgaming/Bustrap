name: Build Bustrap

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\Bustrap.sln

      - name: Build
        run: dotnet build .\Bustrap.sln -c Release --no-restore

      - name: Publish
        run: dotnet publish .\Bustrap\Bustrap.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o .\artifacts\publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bustrap-win-x64
          path: .\artifacts\publish
